paths:
  train_path: data/train_sample.json
  val_path: data/val_sample.json
prompt_template: '### Инструкция:

  Раздели слово на морфемы и укажи тип каждой морфемы


  ### Слово:

  {word}


  ### Ответ:

  '
dataloader_kwargs:
  batch_size: 4,
  shuffle: true,
  pin_memory: true,
  num_workers: 4
tokenizer_kwargs:
  truncation: true
  max_length: 1024
  padding: false
  add_special_tokens: true
num_proc: 4
collator_cfg:
  _target_: transformers.DataCollatorForSeq2Seq
  padding: longest
