_target_:                    morphseg.models.MorphSegModule

pretrained:
  model_name:                hf-internal-testing/tiny-random-LlamaForCausalLM
  torch_dtype:               bf16
  trust_remote_code:         true

quantization:
  enabled:                   true
  load_in_4bit:              true
  bnb_4bit_compute_dtype:    bf16
  bnb_4bit_quant_type:       nf4
  bnb_4bit_use_double_quant: true

optimizer:
  _target_:                  bitsandbytes.optim.PagedAdamW8bit
  lr:                        2e-4
  weight_decay:              0.01

scheduler:
  _target_:                  torch.optim.lr_scheduler.CosineAnnealingLR
  T_max:                     10

scheduler_config:
  interval:                  epoch
  frequency:                 1

lora:
  r:                         16
  lora_alpha:                32
  lora_dropout:              0.05
  target_modules:
    -                        q_proj
    -                        k_proj
    -                        v_proj
    -                        o_proj
  bias:                      none
  task_type:                 CAUSAL_LM