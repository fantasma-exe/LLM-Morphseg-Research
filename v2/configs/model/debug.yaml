_target_:            morphseg.models.morphseg_lightning.MorphSegModule

cfg:
  model_name:        hf-internal-testing/tiny-random-LlamaForCausalLM
  use_4bit:          true
  bf16:              true
  trust_remote_code: true


optimizer:
  _target_:          torch.optim.AdamW
  lr:                2e-4
  weight_decay:      0.01

scheduler:
  _target_:          torch.optim.lr_scheduler.CosineAnnealingLR
  T_max:             10

scheduler_config:
  interval:          epoch
  frequency:         1

lora:
  r:                 16
  lora_alpha:        32
  lora_dropout:      0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  bias:              none
  task_type:         CAUSAL_LM