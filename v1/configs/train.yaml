model:
  name: microsoft/Phi-3-mini-4k-instruct

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: all-linear
  bias: none
  task_type: CAUSAL_LM

training:
  batch_size: 3
  grad_accum: 8
  lr: 2e-4
  epochs: 5
  bf16: true
  logging_steps: 50
  save_strategy: epoch

paths:
  train_data: data/train.jsonl
  test_data: data/test.jsonl
  output_dir: outputs
