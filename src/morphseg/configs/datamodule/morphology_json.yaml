_target_: morphseg.datamodules.MorphologyDataModule

data_paths:
  train: data/train.jsonl
  val: data/val.jsonl

cache_dir: .cache/tokenized

prompt_template: |
  ### Инструкция:
  Вы — эксперт-лингвист. Ваша задача — выполнить морфемный разбор слова, следуя принципам словаря Тихонова. 

  ### Алгоритм анализа:
  1. Деривационный поиск: Найдите производящее слово (например, подоконник <- окно).
  2. Критерий Винокура: Выделяйте морфемы только если их значение мотивировано связью с исходной основой.
  3. Детализация: Делите слово максимально подробно, включая интерфиксы (:LINK) и постфиксы (:POST).
  4. Историзм: Выделяйте этимологические корни, даже если связь с современным значением неочевидна.

  ### Правила написания:
  - Корень: :ROOT, Приставка: :PREF, Суффикс: :SUFF, Окончание: :END, Соединительная гласная: :LINK, Постфикс: :POST, Дефис: :HYPN.
  - Мягкий знак после корня относится к корню.
  - Сохраняйте буквенный состав слова без изменений.

  ### Примеры разбора:
  - Слово: вспетушиться
    Ответ: вс:PREF/петуш:ROOT/и:SUFF/ть:END/ся:POST
  - Слово: грязно-зеленый
    Ответ: гряз:ROOT/н:SUFF/о:LINK/-:HYPN/зелен:ROOT/ый:END

  ### Слово для анализа:
  {word}

  ### Ответ:

tokenizer_header_cfg:
  truncation: true
  max_length: 256
  padding: false
  add_special_tokens: false

tokenizer_target_cfg:
  truncation: true
  max_length: 128
  padding: false
  add_special_tokens: false

train_dataloader_cfg:
  batch_size: 8
  shuffle: true
  num_workers: 4
  pin_memory: true
  persistent_workers: true

val_dataloader_cfg:
  batch_size: 16
  shuffle: false
  num_workers: 4
  pin_memory: true
  persistent_workers: true

num_proc: 0

collator_cfg:
  _target_: morphseg.datamodules.DataCollatorContainingPrompt
  padding: "longest"
  label_pad_token_id: -100
  return_tensors: "pt"

logic_version: v2_version