_target_: morphseg.datamodules.MorphologyDataModule

data_paths:
  train: data/soft-clean-oov/train.jsonl
  val: data/soft-clean-oov/val.jsonl

cache_dir: .cache/tokenized

prompt_template: |
  ### Instruction:
  You are a linguistic expert. Segment the word into morphemes strictly following the format 
  'morpheme:TYPE/morpheme:TYPE'. Output ONLY the segmentation.

  ### Word: {word}
  ### Answer:

tokenizer_header_cfg:
  truncation: true
  max_length: 256
  padding: false
  add_special_tokens: false

tokenizer_target_cfg:
  truncation: true
  max_length: 128
  padding: false
  add_special_tokens: false

train_dataloader_cfg:
  batch_size: 8
  shuffle: true
  num_workers: 4
  pin_memory: true
  persistent_workers: true

val_dataloader_cfg:
  batch_size: 16
  shuffle: false
  num_workers: 4
  pin_memory: true
  persistent_workers: true

num_proc: 0

collator_cfg:
  _target_: morphseg.datamodules.DataCollatorContainingPrompt
  padding: "longest"
  label_pad_token_id: -100
  return_tensors: "pt"

logic_version: v2_version